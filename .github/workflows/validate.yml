name: Validate Configuration

on:
  push:
    branches: [ main ]
    paths:
      - 'automations/**'
      - 'scripts/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'automations/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: 🚀 Trigger Home Assistant (via Cloudflare) 🚀
      run: |
        # Builds the target URL using secrets for DNS name and automation path.
        TARGET_URL="https://${{ secrets.DNS_NAME }}/${{ secrets.AUTOMATION_PATH }}"
        
        # Executes the request with the specific Home Assistant and Cloudflare tokens
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
          -H "Authorization: Bearer ${{ secrets.SECURE_TOKEN1 }}" \
          -H "security_bypass: ${{ secrets.SECURITY_BYPASS }}" \
          -H "security_bypass2: ${{ secrets.SECURITY_BYPASS2 }}" \
          -H "Content-Type: application/json" \
          -d '{"status": "success"}' \
          "$TARGET_URL")
        
        echo "HTTP status: $HTTP_STATUS"
        
        # Fail the action if the request is NOT exactly 200
        if [ "$HTTP_STATUS" -ne 200 ]; then
          exit 1
        fi